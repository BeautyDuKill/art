    <p 
      data-zh="交互装置<br>亚克力、树莓派、舵机、iPad、气敏传感器<br>2022年<br><br>《EMOJī》是一件围绕网络平台中情绪表达展开的互动装置。Emoji 原本是平台交流中被高度压缩的情绪符号，它让复杂的感受变得快速、轻便、可发送。在这件作品中，我将这种在平台中被迅速切换和消费的情绪重新带回物理空间，由身体触发，并通过传感器、舵机和机械表情产生回应。"
      data-en="interactive installation<br>acrylic, Raspberry Pi, servo motors, airflow sensor, iPad<br>2022<br><br>EMOJī is an interactive installation about emotional expression on online platforms. Emoji are highly compressed emotional symbols in platform communication, allowing complex feelings to become quick, lightweight, and deliverable. In this work, I bring emotions that are rapidly switched and consumed on platforms back into physical space, where they are triggered by the body and responded to through sensors, servo motors, and mechanical expressions.">
      作品简介
