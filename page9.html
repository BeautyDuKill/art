    <!-- 1. 装置现场 -->

    <!-- 2. 作品介绍 -->
    <p class="work-info"

      data-zh="
作品类型：四通道影像装置<br>
尺寸：72m × 8m × 8m LED Cube<br>
时长：4'18''<br>
身份：联合导演 / 主制作<br><br>

《变形记》是一件四通道影像装置，受委托作为中国美术学院2025毕业季开幕影像演出。

作品以当代皮影戏的形式展开，由五个章节组成：
《影子的影子》《地球上最伟大的表演》《云图》《对抗生成》与《后台》。

作品结合 Unreal Engine、Stable Diffusion 与 StyleGAN，围绕幻觉、进化、瞬时性与算法重组四个维度展开对“变形”的想象。

变化被视为宇宙演化的常态，而变形则是系统重新组织自身的过程。

在地质时间与瞬时突变、幻象与具身经验之间，观众被置入一个持续生成的动态场域之中。
"

      data-en="
Work Type: Four-channel video installation<br>
Dimensions: 72m × 8m × 8m LED Cube<br>
Duration: 4'18''<br>
Role: Co-Director / Production Lead<br><br>

Metamorphosis is a four-channel video installation commissioned as the opening moving image performance for the 2025 China Academy of Art Graduation Exhibition.

The work unfolds as a contemporary shadow play structured in five acts:
“Shadow within Shadow,” “The Greatest Show on Earth,” “Cloud Atlas,” “Adversarial Generation,” and “Backstage.”

Integrating Unreal Engine, Stable Diffusion, and StyleGAN, the work explores transformation across four dimensions:
hallucination, evolution, instantaneity, and algorithmic recomposition.

Change is understood as the normal state of cosmic evolution, while transformation becomes the reconfiguration of systems.

Between geological time and instantaneous mutation, between illusion and embodiment, the installation situates viewers within a dynamic field of becoming.
">
    </p>
