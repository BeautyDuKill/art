      data-zh="作品类型：AIGC单屏影像<br>时长：2分36秒<br>作品简介：该影片为2023成都大运会委任制作。影片围绕“青年”、“运动”、“文明”之主题展开一场关于体育与文明的奥德赛。以体育竞技运动的整体进程作为影片的叙事结构。“就位” - “蓄势” - “启程” - “冲刺” - “造极”的运动进程，既是协作奋进的人生之旅，也是生生不息的宇宙结构，正如运动中厚积薄发的进程，影片的进程也是一个不断加速、走向绽放的节奏，对应的每个环节讲述了一场关于“行健” - “青年” - “运动” - “文明” - “绽放”的运动史。"
      data-en="Work Type: AIGC Single-Channel Video<br>Duration: 2 min 36 sec<br>Description: Commissioned by the 2023 Chengdu FISU World University Games, the film presents an odyssey of 'youth', 'sports', and 'civilization'. It follows the structure of athletic progression—‘Ready’ – ‘Charge’ – ‘Start’ – ‘Sprint’ – ‘Peak’—a rhythm that mirrors both the collaborative journey of life and the ever-cycling order of the cosmos. As the film accelerates toward its climax, each stage unfolds a story of 'Vitality', 'Youth', 'Movement', 'Civilization', and 'Blossom'.">
