    /* hook 图片样式 */
    #hook {
      position: fixed;
      top: -30px;               /* 上移隐藏截断横边 */
      left: 50%;
      width: 160px;             /* 默认尺寸更大 */
      transform-origin: top center; 
      z-index: -1;              /* 放到文字后面 */
      pointer-events: none;
      transition: width 0.3s, top 0.3s;
    }

    /* 大屏幕放大图片 */
    @media (min-width: 1024px) {
      #hook {
        width: 220px;           /* 电脑端更大 */
        top: -40px;             /* 电脑端稍微上移更多 */
      }
    }

    /* 中等屏幕略微调整 */
    @media (min-width: 768px) and (max-width: 1023px) {
      #hook {
        width: 190px;
        top: -35px;
      }
    }
  </style>

  <script>
    // hook 图片左右旋转摆动
    const hook = document.getElementById('hook');
    let angle = 0;
    const maxAngle = 15; 
    const speed = 0.02 + Math.random() * 0.01; 

    function animateHook() {
      const rotation = Math.sin(angle) * maxAngle;
      hook.style.transform = `translateX(-50%) rotate(${rotation}deg)`;
      angle += speed;
      requestAnimationFrame(animateHook);
    }

    animateHook();
  </script>
