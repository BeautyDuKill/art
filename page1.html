    <h1 data-zh="达芬奇计划：自然剧场" data-en="Da Vinci Project: Teatro Naturale">达芬奇计划：自然剧场</h1>

    <p data-zh="“自然剧场”基于达芬奇的手稿及其自然观，包含了以技术哲学为线索完成的三个装置（流水、大海、月相）和一部三维世界观影像创作。"
       data-en="“Teatro Naturale” is based on Da Vinci's manuscripts and his view of nature, including three installations (Flowing Water, Ocean, Moon Phases) and a 3D worldview video work guided by technical philosophy.">
      “自然剧场”基于达芬奇的手稿及其自然观……
    </p>
    
    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/qmBD_ipbx90?si=PN9GiPP6mtWM1smM" allowfullscreen></iframe>
    </div>
    
    <p class="video-description" data-zh="单屏数字影像<br>时长：2分31秒<br>该影像呈现无法在现实中还原的装置作品，通过三维构建，打造一个超现实的自然剧场。"
       data-en="Single-screen digital video<br>Duration: 2m31s<br>This video presents installations that cannot be reproduced in reality, creating a surreal nature theater through 3D construction.">
      单屏数字影像……
    </p>

    <p data-zh="以下内容为于2022完成的“自然剧场”项目系列的实体装置部分，月相、大海、流水为该项目的三个落地实体装置。"
       data-en="The following presents the physical installations of the 2022 Nature Theater project series: Moon Phases, Ocean, and Flowing Water.">
      以下内容为于2022完成的……
    </p>

    <!-- 流水 -->
    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/BAKa31U7wN4?si=NWIqtMKY4PR4mMFJ" allowfullscreen></iframe>
    </div>
    <p class="video-description" 
       data-zh="作品名称：流水<br>作品类型：动态装置<br>作品尺寸：尺寸可变<br>作品简介：三台打印机输出的文本分别为近20年长江、黄河、珠江流经区域的水力发电量。水坝截取了整条河流，全部水流被毫无保留地揭示为焦耳——事物的意义在一开始就已经被设置好了。三条数据河流作为现代技术架构下被提前安排好的持存物，机械地以某种范式不断循环流动。"
       data-en="Title: Flowing Water<br>Type: Kinetic Installation<br>Size: Variable<br>Description: Three printers output text representing the hydroelectric power of the Yangtze, Yellow, and Pearl Rivers over the past 20 years. The dams intercept entire rivers, and all water flow is revealed in joules — meaning was predetermined from the start. These three data rivers circulate mechanically under a preset paradigm, as stored entities within modern technological infrastructure.">
      作品名称：流水……
    </p>

    <!-- 大海 -->
    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/X6QWtlloJTw?si=8ss75nN1UShKP9te" allowfullscreen></iframe>
    </div>
    <p class="video-description" 
       data-zh="作品名称：大海<br>作品类型：动态装置<br>作品尺寸：182cm*171cm*48cm<br>作品简介：伐木，开荒，造湖，改造自然。我们坚信自己已然拥有控制外部世界的能力。“自然”不再是“自行发生”，不再是人类干预之外的存在。然而费尽心机的计算和精密复杂的传动也终究比不上源于地底的巨大力量，一同在海面上引起一阵涟漪。"
       data-en="Title: Ocean<br>Type: Kinetic Installation<br>Size: 182cm*171cm*48cm<br>Description: Logging, land reclamation, lake construction, transforming nature. We believe we have control over the external world. 'Nature' no longer occurs spontaneously, nor exists outside human intervention. Yet even the most meticulous calculations and precise mechanisms cannot match the immense forces from beneath, which together create ripples on the ocean surface.">
      作品名称：大海……
    </p>

    <!-- 月相 -->
    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/6lqo4lHnEJ8?si=dKbSme1s8ySEm4F6" allowfullscreen></iframe>
    </div>
    <p class="video-description" 
       data-zh="作品名称：月相<br>作品类型：动态装置<br>作品尺寸：200cm*200cm*220cm<br>作品简介：当“一年有十二个月，一个月有三十天”的历法为我们所不断继承，奉为圭臬，融入人类集体潜意识的海床，那些穷尽一生裸眼观察月亮阴晴圆缺变化的占星古人就成为邪门歪道了吗？在这个时代，技术理性拥有着较高的话语权，而切身感受却成为了某种奢望。且同几千年前一般体会时间的消逝，眺望月亮的深邃吧。"
       data-en="Title: Moon Phases<br>Type: Kinetic Installation<br>Size: 200cm*200cm*220cm<br>Description: As the calendar of twelve months a year, thirty days a month, is continuously inherited and integrated into the collective human subconscious, were the ancient astrologers who spent their lives observing the moon's phases considered eccentric? In this era, technological rationality holds great authority, while personal sensory experience becomes a luxury. Yet, just as thousands of years ago, we contemplate the passage of time and gaze into the depth of the moon.">
      作品名称：月相……
    </p>
