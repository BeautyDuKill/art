    <p 
      data-zh="有声数字影像<br>2分55秒<br>2025<br><br>《MetroLove™ : Beta 1.0》是在我来到汉堡后的通勤体验中慢慢长出来的一个小片子。每天换乘的路上，我总要在两辆刚刚好同时到站的列车之间快速切换——那种差点错过、被迫加速、又顺利无缝接入下一班地铁的身体感，也同样出现在深夜去club、去约会的时候。
我开始意识到，这种“无缝接入下一班列车”的身体感，也与网络平台中的社交与情绪节奏十分相似。无论是通勤、社交软件、深夜俱乐部，还是不断切换的信息流，人似乎都被一种持续运转的系统所吸纳和加速。
<br>于是，我把地铁想象成一条输送情感与欲望的基础设施：精准、无误、持续高速流动，赛博空间和物理空间在此重合，并借一个荒诞的设定打开一个延迟的乌托邦——在这里，肉体重新生长，时间错乱，甚至连地铁本身也拥有了身体。
"
      data-en="Digital video with sound<br>2′55″ <br>2025<br><br>MetroLove™ : Beta 1.0 is a video work that gradually emerged from my daily commuting experiences after arriving in Hamburg. During transfers, I often found myself rapidly switching between two trains arriving at almost the exact same moment — the bodily sensation of nearly missing one train, being forced to accelerate, and then seamlessly catching the next also began to appear in other moments of urban life: going to clubs late at night, going on dates, moving continuously through the city.
<br>I gradually realized that this visceral feeling of “seamlessly connecting to the next train” closely resembles the social and emotional rhythms of online platforms. Whether through commuting, social media, nightlife, or endlessly shifting information feeds, people seem to be absorbed into and accelerated by systems operating ceaselessly.
<br>From this, I began imagining the metro as an infrastructure for transporting emotions and desires: precise, uninterrupted, and constantly moving at high speed. Here, cyberspace and physical space begin to overlap, opening up an absurd and delayed utopia — a world where flesh regenerates, time becomes unstable, and even the metro itself has a body.
">
