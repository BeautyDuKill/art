    <h1 data-zh="PDF to Page 计划" data-en="PDF to Page Project">PDF to Page 计划</h1>

    <!-- 图片 -->
    <img src="p2p-1.png" alt="PDF to Page 静帧" class="main-image">

    <!-- 作品介绍 -->
    <p data-zh="作品类型：多屏影像装置<br>作品简介：P2P（PDF to Page）是一个长期的创作计划，以现代网络生存经验为活动阵地,希望通过创作以及作品间的对话解构日益稳固的意义体系和习以为常的平滑空间，像PDF一样主动建构，像Page一样期待对话，永远未完成，永远在行动。<br>依托当代数字生活中必不可少的的PDF（可便携文档格式），图文信息可以十分高效地在用户间交换，同时不必担心精心编排好的结构和文本顺序被改变。PDF凝聚着某种唯一的视角，传播着某种同质的意识形态。<br>而Page（一页纸）作为前互联网的阅读书写经验，可以通过顺序排列成结构严密的PDF，在这个层面上，Page拥有着机动性、未完成性、不稳定性。Page可以以一种游击的姿态松动PDF的中心意义，主动对习以为常的线上生活和背后的制度配置、技术背后的意识形态等发起提问。<br>近来，技术未来主义视野下Web3的去中心化设计似乎逐渐成为我们唯一的未来想象，相信一种技术发展可以解决所有问题的美好未来。但与此同时，其技术架构又将每个人都代币化为同质的个体，“万物互联，众生孤独”越来越成为一种具身的感受。此时重提同为去中心设计的P2P技术显然是更有意义的：相比于Web3，P2P的用户间有着更松散的权责关系，一个节点可以同时是上传者和下载者，节点间亦拥有着灵活的有机对话和组织关系。<br>项目“PDF 2 Page”希望继承P2P的有机对话的特性，使意义在现有的完整的结构（PDF）和能动的个体（Page）间产生流动和再生产。同时，PDF始终要自我松动，自视渺小,将自身降维成意义有待完善的Page，期待与其他的异质的Page对话并结构成未成形的经验。" 
       data-en="Work Type: Multi-screen Video Installation<br>P2P (PDF to Page) is a long-term creative project rooted in the experiences of contemporary digital existence. It aims to deconstruct increasingly entrenched systems of meaning and habitualized frictionless spaces through artistic practice and intertextual dialogues. Like a PDF file that actively constructs its own framework, and like a Page that anticipates conversation, this project remains perpetually incomplete, perpetually in motion.<br>PDF—the Portable Document Format—epitomizes an essential medium of digital life, enabling efficient exchange of formatted texts and images while preserving meticulously curated structures and sequences. It embodies a singular perspective, propagating homogenized ideologies.<br>Page, by contrast, represents pre-internet reading/writing experiences. Though pages can be sequentially compiled into rigid PDFs, they inherently possess mobility, incompleteness, and instability. Pages adopt guerilla tactics to destabilize the centralized meanings of PDFs, actively interrogating normalized online lifestyles, institutional infrastructures, and the ideologies embedded in technology.<br>Under the lens of techno-futurism, Web3's decentralized architecture appears increasingly as our sole vision of the future—a utopian belief that technological progress will resolve all dilemmas. Yet paradoxically, its framework tokenizes individuals into homogeneous entities. 'Everything is connected, yet everyone is alone' grows ever more visceral. Revisiting the organic decentralization of P2P technology becomes urgent: unlike Web3, P2P fosters looser user responsibilities, where nodes fluidly alternate as uploaders/downloaders, sustaining flexible dialogues and organic relationships.<br>PDF 2 Page seeks to inherit P2P's ethos of organic dialogue, enabling meaning to flow and reproduce between established structures (PDFs) and dynamic individuals (Pages). Simultaneously, PDFs must persistently self-disrupt, humbly reduce themselves to 'imperfect Pages' awaiting refinement, and yearn for dialogue with heterogeneous Pages to coalesce into nascent configurations of experience.">
      作品介绍
    </p>     

    <!-- 作品一 -->
    <h1 data-zh="作品一 种杂草" data-en="Work 1: WEEDS!">作品一 种杂草</h1>
    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/3vvnnxUeFX0?si=Uxahl3tzR7FXAsBu" allowfullscreen></iframe>
    </div>
    <p class="video-description" 
       data-zh="单屏数字影像<br>1分55秒<br>整齐紧密的居民楼、功能齐全的封闭操作系统、形状规整的绿化带，我们生活在完善的结构里，游荡在坚固的表面间，获取着前置规划的意义。因此以杂草为方法，期许能收获异质的经验，在各种表面游击行动！"
       data-en="Single screen video<br>1'55''<br>Neatly packed residential blocks, fully functional closed operating systems, meticulously shaped greenbelts — we live within perfected structures, drifting across hardened surfaces, absorbing pre-planned meanings. Thus, we take weeds as our method, hoping to harvest heterogeneous experiences and launch guerrilla actions across all kinds of surfaces!">
      作品一介绍
    </p>

    <!-- 作品二 -->
    <h1 data-zh="作品二 饱可梦" data-en="Work 2: Bukmang GO">作品二 饱可梦</h1>
    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/YqwwvyPgt9Y?si=5Ov8iLk_NbOj2uzG" allowfullscreen></iframe>
    </div>
    <p class="video-description"
       data-zh="单屏数字影像<br>2分52秒<br>Pokemon GO（精灵宝可梦GO）是全球风靡的增强现实游戏，通过与宝可梦对战，数字化信息成了我们的现实经验。<br>吃播（Mukbang）是令人上头的线上娱乐体验，作为线上情感陪伴，很大程度上缓解了现代生活的孤独感。而随着类型化的吃播门类愈加稳固和清晰，开始出现了一些同质化的剧本、滤镜，甚至是作弊的手段（大胃王催吐）。娱乐的视频已然成为了一个生产的空间，背后有着成熟的产业系统。<br>通过增强现实的手段，将吃播博主的食物替换为：与推特明星身价相绑定的加密货币、不断更新迭代的消费级电子产品的图标、作为流量时代新型货币的点赞。通过倒放的吃播，我们希望不断解构并如做雕塑一般重塑这些日益稳固的数字经验。"
       data-en="Single screen video<br>2'52''<br>Pokemon GO is a globally popular augmented reality game. Through battles with Pokémon, digital information becomes part of our real-world experience.<br>Mukbang is an addictive form of online entertainment, serving as virtual companionship and alleviating modern loneliness. As mukbang content becomes increasingly categorized and standardized, homogenized scripts, filters, and even cheating tactics (like competitive eaters inducing vomiting) appear. These entertainment videos have become sites of production under a mature industrial system.<br>Through augmented reality, we replace mukbang streamers’ food with cryptocurrencies tied to Twitter celebrity net worth, constantly updated consumer electronics icons, and 'likes' as the new currency of the attention economy. Playing mukbang videos in reverse, we aim to deconstruct and sculpt these increasingly solidified digital experiences.">
      作品二介绍
    </p>

    <!-- 作品三 -->
    <h1 data-zh="作品三 弹幕使用指北" data-en="Work 3: Bullet-Screen User Guide">作品三 弹幕使用指北</h1>
    <p data-zh="系列单屏影像" data-en="Series single-screen videos">系列单屏影像</p>

    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/CXjgGdz8Bcs?si=SepVCrSJ6Sx_xak4" allowfullscreen></iframe>
    </div>
    <p class="video-description"
       data-zh="如何成为无名之辈？<br>1分4秒<br>朋友圈、微博、小红书，每个人都有机会通过塑造自我吸引目光，抑或不可避免地被动成名。数字时代，如何成为无名之辈？这不是众人聚集的体育场，而是数字居民的世界。通过成为弹幕，数字人们得以被完全覆盖，而只剩下话语本身仓促地、不稳定地流动，偶遇的对话，汇聚但不聚集的群体，弹幕是在（详细描述的）社交媒体中成为无名之辈的最佳选择。"
       data-en="How to be Niemand?<br>1'4''<br>Moments, Weibo, Xiaohongshu — everyone has a chance to attract attention by crafting a self-image, or else be passively thrust into fame. In the digital age, how does one remain anonymous? This is not a crowded stadium, but a world inhabited by digital citizens. By becoming a *danmu* (real-time comment overlay), digital individuals are entirely dissolved — leaving only language itself to flow hastily and unstably. Fleeting conversations, gatherings without cohesion, encounters without presence: *danmu* offers the most viable path to anonymity within the meticulously scripted realm of social media.">
      弹幕作品介绍
    </p>

    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/Ub7k5p1zbcU?si=HHAl3dln5E8k2krp" allowfullscreen></iframe>
    </div>
    <p class="video-description"
       data-zh="如何阅读新闻？<br>34秒<br>新闻，是对当下世界的截屏，是凝固的时间的集合。视频的时间在进度条上，拖动时间轴，世界的时间，视频的时间和弹幕的时间被打乱重组（拖动），我们得以乘着弹幕，在无时间的时间里完成一次穿梭式的新闻阅读。"
       data-en="How to read the News?<br>34''<br>News is a screenshot of the present world — a collection of frozen moments in time. In videos, time unfolds along the progress bar; by dragging the timeline, the time of the world, the time of the video, and the time of the *danmu* (real-time comments) are disrupted and rearranged. Riding on the *danmu*, we traverse through a timeless time, completing a teleportative reading of the news.">
      阅读新闻介绍
    </p>

    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/N6qRZhfPnBA?si=KEbYy6hMS_wpazr9" allowfullscreen></iframe>
    </div>
    <p class="video-description"
       data-zh="如何松动都市？<br>60秒<br>等距的车道，统一修剪的绿化带，复制粘贴的大楼，目之所及，都市生活的一切都是前置规划的整齐。打开弹幕，松动紧密且均质的都市。这些自发设计的招牌和广告，均是店家从自己的角度出发，自行设计搭建的生活图像。它们像弹幕一般五花八门、鱼龙混杂，也同弹幕一样自下而上且动态地解构重塑着整体的意义。"
       data-en="How to loosen the city?<br>60''<br>Equidistant lanes, uniformly trimmed greenbelts, copy-pasted buildings — everything within sight in urban life is neatly pre-planned. Turn on the *danmu*, and the tightly ordered, homogeneous city begins to loosen. These spontaneously designed shop signs and advertisements are everyday visual expressions created by store owners from their own perspectives. Like *danmu*, they are diverse, chaotic, and messy — yet also grassroots and dynamic, constantly deconstructing and reshaping the overall meaning from the bottom up.">
      松动都市介绍
    </p>
