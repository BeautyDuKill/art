    <h1 data-zh="自然剧场" data-en="Natural Theatre">自然剧场</h1>

    <p data-zh="2022年<br>《自然剧场》是一组由动态装置和数字影像构成的作品。作品从大海、流水和月相等自然现象出发，通过机械运动、打印文本、光线变化和三维影像，重新组织这些现象的观看方式。作品并不把自然与技术视为对立关系，而是关注自然如何在技术媒介中被捕捉和理解。
"
       data-en="2022<br>Natural Theatre is a series of works composed of kinetic installations and digital video. Starting from natural phenomena such as the sea, flowing water, and lunar phases, the project reorganizes the ways these phenomena are viewed through mechanical movement, printed text, changes of light, and 3D imagery. Rather than treating nature and technology as opposites, the work explores how nature is captured and understood through technical media.
">
      “自然剧场”……
    </p>
    
    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/yYW_JmBuOCA?si=AbrEhHymUnbJYpjr" allowfullscreen></iframe>
    </div>
    
    <p class="video-description" data-zh="《渲染自然》<br>有声数字影像<br>2分31秒<br>这件三维影像从自然现象和技术媒介的关系出发。影像通过三维建模生成一个不受现实材料和空间尺度限制的虚拟剧场。在这里，三维影像不是对现实装置的简单模拟，而是一种扩展装置可能性的方式。自然不再只是外部风景，而成为被技术想象重新组织的感知环境。
"
       data-en="Rendered Nature<br>Digital video with sound<br>2′31″<br>This 3D video starts from the relationship between natural phenomena and technical media. Through 3D modelling, the work generates a virtual theatre no longer limited by physical materials or spatial scale. Here, the 3D image is not a simple simulation of a physical installation, but a way to expand what an installation can become. Nature is no longer presented as an external landscape, but as a perceptual environment reorganized through technological imagination.">
      单屏数字影像……
    </p><br>

    <p data-zh="以下为《自然剧场》的实体装置部分"
       data-en="The following presents the physical installations of the Natural Theater">
      以下内容为于2022完成的……
    </p>

    <!-- 流水 -->
    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/Vx4uh0e0CfE?si=ls4CKE48UY_VRetx" allowfullscreen></iframe>
    </div>
    <p class="video-description" 
       data-zh="《流水》<br>动态装置(针式打印机、纸带、铝型材、数据文本)<br>尺寸可变<br><br>《流水》由三台针式打印机持续输出近二十年长江、黄河和珠江流经区域的水力发电量数据。在水力发电系统中，河流被转化为可计算、可调度的能量单位。作品呈现自然流动如何在现代技术结构中被重新表述，并循环为一种可管理的资源。"
       data-en="Flowing Water<br>Kinetic installation(dot matrix printers, paper tape, aluminum profiles, textual data)<br>dimensions variable<br><br>Flowing Water consists of three dot-matrix printers continuously printing hydroelectric power generation data of the dams and reservoirs built along the Yangtze River, the Yellow River, and the Pearl River over the past twenty years. Within hydroelectric systems, rivers are transformed into calculable and adjustable units of energy. The work presents how natural flow is rearticulated within modern technical structures and circulated as a manageable resource.

">
      作品名称：流水……
    </p><br>

    <!-- 大海 -->
    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/4YnEFLQ-luI?si=rswxZvsTol-Ha5Q9" allowfullscreen></iframe>
    </div>
    <p class="video-description" 
       data-zh="《大海》<br>动态装置(自行车零件、金属结构、水缸、橡皮鸭)<br>182cm*171cm*48cm<br><br>《大海》是一件通过机械传动制造水面波纹的动态装置。装置持续运转，在水缸中制造细小的涟漪。作品回应人类试图改造和控制自然的冲动。费力运转的机械结构最终只能制造短暂的波纹，既像一次对海的模拟，也像一次对控制欲的暴露。"
       data-en="Sea<br>Kinetic installation(bicycle parts, metal structure, water tank, rubber duck)<br>182cm*171cm*48cm<br><br>Sea is a kinetic installation that creates ripples on the surface of water through mechanical transmission. The structure moves continuously, generating small waves inside a water tank. The work responds to the human impulse to modify and control nature. The laborious mechanism ultimately produces only temporary ripples, becoming both a simulation of the sea and an exposure of the desire for control.
">
      作品名称：大海……
    </p><br>

    <!-- 月相 -->
    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/ZTME2mg5HfM?si=r1fPWM80cKAhgcKL" allowfullscreen></iframe>
    </div>
    <p class="video-description" 
       data-zh="月相<br>动态装置(泡沫、真石漆、LED 灯组、亚克力、电机、铝型材)<br>200cm*200cm*220cm<br><br>《月相》以月亮的盈亏变化为线索，将天体周期转化为一个可被观看的装置场景。装置在空间中重新演示月相变化，也让历法中被固定的时间重新回到观看和感受之中。作品试图唤起一种身体性的时间经验：在精确计量之外，重新感受时间的流逝、循环和不可完全掌控。"
       data-en="Moon Phase<br>Kinetic installation(foam, stone-effect coating, LED light modules, acrylic, motors, aluminum profiles)<br>200cm*200cm*220cm<br><br>Sea is a kinetic installation that creates ripples on the surface of water through mechanical transmission. The structure moves continuously, generating small waves inside a water tank. The work responds to the human impulse to modify and control nature. The laborious mechanism ultimately produces only temporary ripples, becoming both a simulation of the sea and an exposure of the desire for control.">
      作品名称：月相……
    </p>
