    <p 
      data-zh="作品类型：CGI影像<br>作品简介：<br>《MetroLove™ : Beta 1.0》是在我来到汉堡后的通勤体验中慢慢长出来的一个小片子。每天换乘的路上，我总要在两辆刚刚好同时到站的列车之间快速切换——那种差点错过、被迫加速、又顺利无缝接入下一班地铁的身体感，这种感受也出现在深夜去club、去约会的时候。在这个24小时运行的城市里，我常常觉得自己也被吸进了地铁系统的节奏里。<br>这种日常里的情感加速让我既兴奋又不安：一方面一切都没有阻力、效率惊人；另一方面，又总觉得自己在加速的轨道上逐渐被抹平成一个NPC。<br>于是，我把地铁想象成一条输送情感与欲望的基础设施：精准、无误、持续高速流动。并借一个荒诞的设定打开一个“延迟乌托邦”——在这里，肉体重新生长，时间错乱，甚至连地铁本身也拥有了身体。<br>这个Beta 1.0版本像是世界观设定的先导片。"
      data-en="Work Type: CGI Video<br>Description: <br>MetroLove™ : This video grew out of my daily commute after arriving in Hamburg.Every morning,I find myself running between two trains that arrive at exactly the same time—that bodily sensation of almost missing it, being forced to accelerate,and then slipping seamlessly into the next ride.I also noticed the same feeling returning at night—on the way to clubs, to dates—as if I, too, had been absorbed into a city that runs on a 24-hour transit rhythm.<br>This constant acceleration of emotion makes me both excited and uneasy.On one hand, everything flows without resistance,desire seems instantly reachable.On the other, I can’t shake the feeling of being flattened into an NPC along the way.<br>So I began to imagine the metro as an infrastructure for transporting emotion and desire— precise, frictionless, always in motion.Through an absurd premise, the film opens onto a delayed utopia: a place where bodies grow back, time slips out of sync,and even the metro itself begins to develop a body.<br>Beta 1.0 functions as a world-building prototype .">
    </p>
