    <h1 data-zh="PDF to Page" data-en="PDF to Page">PDF to Page</h1>

    <!-- 图片 -->
    <img src="images/p2p-2.png" alt="PDF to Page 静帧" class="main-image">

    <!-- 作品介绍 -->
    <p data-zh="多屏影像装置<br>2023年<br><br>《P2P（PDF to Page）》项目从当代数字生活中极为常见的 PDF 出发：PDF 让图文信息得以高效交换，同时也固定了版面、结构和阅读顺序。在这个意义上，PDF 不只是一个文件格式，也象征着一种稳定、封闭、可归档的意义结构。
<br>与之相对，Page 既指一页纸，也指网页中的“页面”。它可以被书写、滚动、跳转、打断和重新连接，因而保留了更多机动性、未完成性和不稳定性。项目希望让 Page 以一种游击式的姿态侵入 PDF，重新打开被格式化的数字阅读和网络观看经验。
<br>在这里，P2P 并不是被直接解释的技术协议 “peer to peer”，而是一种结构隐喻和创作方法。弹幕、吃播、手游、新闻阅读、城市招牌和 emoji 等网络经验片段被制作成一个个动态影像，像彼此独立又相互连接的节点一样，共同松动 PDF 所代表的稳定文档结构。作品因此不再是一个封闭文本，而成为一个不断连接、转译和再生产的创作结构。
" 
       data-en="Multi-screen video installation<br>2023<br><br>P2P (PDF to Page) begins with the PDF, a format that has become almost indispensable in contemporary digital life. PDFs allow textual and visual information to be exchanged efficiently, while also fixing the layout, structure, and reading order of a document. In this sense, the PDF is not only a file format, but also represents a stable, closed, and archivable structure of meaning.
<br>In contrast, “Page” refers both to a sheet of paper and to a webpage. It can be written on, scrolled through, jumped across, interrupted, and reconnected, therefore retaining a greater sense of mobility, incompleteness, and instability. The project attempts to let the “Page” infiltrate the “PDF” in a guerrilla mode of action, reopening formatted modes of digital reading and networked viewing experience.
<br>Here, P2P is not treated as a technical protocol to be directly explained — “peer to peer” — but as a structural metaphor and creative method. Fragments of networked experience, such as bullet screens, livestream eating, mobile games, news reading, urban signs, and emoji, are turned into individual moving-image works. Like independent yet interconnected nodes, they collectively loosen the stable document structure represented by the PDF. As a result, the work is no longer a closed text, but becomes a creative structure of continuous connection, translation, and reproduction.
">
      作品介绍
    </p>     
    <!-- 作品一 -->
    <h1 data-zh="作品一 弹幕使用指北" data-en="Work 1: Bullet-Screen User Guide">作品一 弹幕使用指北</h1>
    <p data-zh="系列单屏影像" data-en="Series single-screen videos">系列单屏影像</p>

    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/szxtnh3vmX0?si=KHN4Ql7nZ-rkxl4m" allowfullscreen></iframe>
    </div>
    <p class="video-description"
       data-zh="如何成为无名之辈？<br>1分4秒<br>在社交媒体上，每个人都被鼓励去塑造形象、吸引注意，或在不经意间被推入可见性之中。在数字时代，一个人如何保持匿名？通过实时弹幕，身体逐渐被语言覆盖。个体消解为流动的文字、嘈杂的对话与集体性的在场，并在社交媒体的空间中寻找一种可能的消失方式。"
       data-en="How to Become Nobody?<br>1'4''<br>On social media, everyone is encouraged to craft an image, attract attention, or be unexpectedly pushed into visibility. In the digital age, how does one remain anonymous?Through real-time bullet-screen comments, the body is gradually covered by language. The individual dissolves into flowing text, noisy conversation, and collective presence, searching for a possible way to disappear within the space of social media.">
      弹幕作品介绍
    </p>

    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/ec3ulpw9TXU?si=9WiVTdgNX8Ta-8kv" allowfullscreen></iframe>
    </div>
    <p class="video-description"
       data-zh="如何阅读新闻？<br>34秒<br>新闻是当下世界的一张截图——一组被选择出来、冻结在时间中的瞬间。在影像中，时间沿着进度条展开：世界的时间、视频的时间，以及弹幕评论的时间被拖拽到一起。观众在这些层叠的时间线中移动，完成一次临时而不稳定的新闻阅读。"
       data-en="How to Read the News?<br>34''<br>News is a screenshot of the present world — a collection of selected moments frozen in time. In the video, time unfolds along a progress bar: the time of the world, the time of the video, and the time of Bullet-screen comments are dragged together.By moving through these layered timelines, the viewer completes a temporary and unstable reading of the news.">
      阅读新闻介绍
    </p>

    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/8tL7nQMNuJQ?si=ILravgevCM5nWFPO" allowfullscreen></iframe>
    </div>
    <p class="video-description"
       data-zh="如何松动都市？<br>60秒<br>等距的车道、修剪整齐的绿化带、复制粘贴般的建筑——城市看起来被整齐地规划，并趋于同质化。

当弹幕评论被打开时，这个有序的表面开始松动。与弹幕类似，手写店招和广告也是一种自下而上的视觉表达：多样、混杂，并不断从下方重塑城市的意义。"
       data-en="How to Loosen the City?<br>60''<br>Equidistant lanes, trimmed greenbelts, copy-pasted buildings — the city appears neatly planned and homogeneous.When Bullet-screen comments are turned on, this ordered surface begins to loosen. Like Bullet-screen comments, handwritten shop signs and advertisements are bottom-up visual expressions: diverse, messy, and constantly reshaping the city’s meaning from below.">
      松动都市介绍
    </p>
  

    <!-- 作品二 -->
    <h1 data-zh="作品二 饱可梦" data-en="Work 2: Bukmang GO">作品二 饱可梦</h1>
    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/Bx6R9l_v6iI?si=fajeWKs9lml5WsJC" allowfullscreen></iframe>
    </div>
    <p class="video-description"
       data-zh="单屏数字影像<br>2分52秒<br>Pokemon GO（精灵宝可梦GO）是全球风靡的增强现实游戏，通过与宝可梦对战，数字化信息成了我们的现实经验。<br>吃播（Mukbang）是令人上头的线上娱乐体验，作为线上情感陪伴，很大程度上缓解了现代生活的孤独感。而随着类型化的吃播门类愈加稳固和清晰，开始出现了一些同质化的剧本、滤镜，甚至是作弊的手段（大胃王催吐）。娱乐的视频已然成为了一个生产的空间，背后有着成熟的产业系统。<br>通过增强现实的手段，将吃播博主的食物替换为：与推特明星身价相绑定的加密货币、不断更新迭代的消费级电子产品的图标、作为流量时代新型货币的点赞。通过倒放的吃播，我们希望不断解构并如做雕塑一般重塑这些日益稳固的数字经验。"
       data-en="Single screen video<br>2'52''<br>Pokemon GO is a globally popular augmented reality game. Through battles with Pokémon, digital information becomes part of our real-world experience.<br>Mukbang is an addictive form of online entertainment, serving as virtual companionship and alleviating modern loneliness. As mukbang content becomes increasingly categorized and standardized, homogenized scripts, filters, and even cheating tactics (like competitive eaters inducing vomiting) appear. These entertainment videos have become sites of production under a mature industrial system.<br>Through augmented reality, we replace mukbang streamers’ food with cryptocurrencies tied to Twitter celebrity net worth, constantly updated consumer electronics icons, and 'likes' as the new currency of the attention economy. Playing mukbang videos in reverse, we aim to deconstruct and sculpt these increasingly solidified digital experiences.">
      作品二介绍
    </p>


  <!-- 作品三 -->
    <h1 data-zh="作品三 种杂草" data-en="Work 3: WEEDS!">作品三 种杂草</h1>
    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/G8i7tvrlysE?si=Dkn7RQHm6cRYbWU-" allowfullscreen></iframe>
    </div>
    <p class="video-description" 
       data-zh="单屏数字影像<br>1分55秒<br>整齐紧密的居民楼、功能齐全的封闭操作系统、形状规整的绿化带，我们生活在完善的结构里，游荡在坚固的表面间，获取着前置规划的意义。因此以杂草为方法，期许能收获异质的经验，在各种表面游击行动！"
       data-en="Single screen video<br>1'55''<br>Neatly packed residential blocks, fully functional closed operating systems, meticulously shaped greenbelts — we live within perfected structures, drifting across hardened surfaces, absorbing pre-planned meanings. Thus, we take weeds as our method, hoping to harvest heterogeneous experiences and launch guerrilla actions across all kinds of surfaces!">
      作品三介绍
    </p>
